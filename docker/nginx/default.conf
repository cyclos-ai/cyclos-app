##############################################################################
# Gzip compression
##############################################################################
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    image/svg+xml
    font/woff
    font/woff2;

##############################################################################
# PHP-FPM upstream
##############################################################################
upstream php-fpm {
    server app:9000;
    keepalive 16;
}

##############################################################################
# Main server block — wildcard for multi-tenant subdomain routing
##############################################################################
server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Increase body size for file uploads
    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"   always;
    add_header X-Content-Type-Options   "nosniff"      always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    ##########################################################################
    # Static assets — long-lived cache, served directly from public/build
    ##########################################################################
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    ##########################################################################
    # Laravel Vite build assets (hashed filenames — safe to cache forever)
    ##########################################################################
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    ##########################################################################
    # SPA catch-all — every non-file request goes to index.php
    # Laravel handles subdomain routing internally via stancl/tenancy
    ##########################################################################
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    ##########################################################################
    # PHP-FPM handler
    ##########################################################################
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        # Pass Host header so Laravel tenancy resolver gets the subdomain
        fastcgi_param HTTP_HOST       $host;

        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    ##########################################################################
    # Deny access to hidden files (.env, .git, etc.)
    ##########################################################################
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    ##########################################################################
    # Deny direct access to artisan
    ##########################################################################
    location = /artisan {
        deny all;
    }
}
