<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyclos.ai — API Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'system-ui', 'sans-serif'],
            mono: ['DM Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg-deep:    #040d1a;
      --bg-panel:   #0a1628;
      --bg-sidebar: #070f1e;
      --bg-card:    #0f1e35;
      --bg-hover:   #132040;
      --border:     rgba(148,163,184,0.08);
      --border-md:  rgba(148,163,184,0.13);
      --teal:       #0d9488;
      --teal-light: #2dd4bf;
      --teal-glow:  rgba(13,148,136,0.18);
      --text-1:     #f1f5f9;
      --text-2:     #94a3b8;
      --text-3:     #4b6282;
      /* JSON token colors */
      --json-key:     #2dd4bf;
      --json-str:     #86efac;
      --json-num:     #fb923c;
      --json-bool:    #c084fc;
      --json-null:    #f87171;
      --json-brace:   #94a3b8;
      --json-comma:   #475569;
    }

    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }

    body {
      background: var(--bg-deep);
      color: var(--text-1);
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e3052; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a4270; }

    /* ── App shell ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Top header ── */
    #top-header {
      flex: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      z-index: 20;
    }

    .wordmark {
      font-size: 1.0625rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #f1f5f9;
    }
    .wordmark span {
      background: linear-gradient(135deg, #0d9488, #2dd4bf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Auth badge ── */
    .auth-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid rgba(13,148,136,0.25);
      background: rgba(13,148,136,0.08);
      color: #2dd4bf;
      transition: all 0.2s;
    }
    .auth-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #0d9488;
      box-shadow: 0 0 6px rgba(13,148,136,0.9);
      animation: pulse-dot 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    .auth-badge.pending .dot {
      background: #f59e0b;
      box-shadow: 0 0 6px rgba(245,158,11,0.9);
      animation: none;
    }
    .auth-badge.pending { border-color: rgba(245,158,11,0.25); background: rgba(245,158,11,0.08); color: #fcd34d; }
    .auth-badge.failed .dot {
      background: #ef4444;
      box-shadow: 0 0 6px rgba(239,68,68,0.9);
      animation: none;
    }
    .auth-badge.failed { border-color: rgba(239,68,68,0.25); background: rgba(239,68,68,0.08); color: #fca5a5; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-3);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text-2); }

    /* ── Main body (sidebar + content) ── */
    #body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      flex: none;
      width: 252px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section-label {
      padding: 14px 16px 6px;
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .ep-list {
      list-style: none;
      margin: 0;
      padding: 0 8px;
    }

    .ep-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.12s;
      user-select: none;
      margin-bottom: 1px;
    }
    .ep-item:hover { background: var(--bg-hover); }
    .ep-item.active {
      background: linear-gradient(90deg, rgba(13,148,136,0.14), rgba(13,148,136,0.06));
      box-shadow: inset 2px 0 0 var(--teal);
      border-radius: 0 7px 7px 0;
      margin-left: -8px;
      padding-left: 18px;
    }

    .method-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 0.5625rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .method-get  { background: rgba(16,185,129,0.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
    .method-post { background: rgba(59,130,246,0.12); color: #93c5fd; border: 1px solid rgba(59,130,246,0.2); }

    .ep-path {
      font-family: 'DM Mono', monospace;
      font-size: 0.6875rem;
      color: var(--text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.12s;
    }
    .ep-item:hover .ep-path,
    .ep-item.active .ep-path { color: var(--text-1); }

    /* ── Content pane ── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-panel);
    }

    /* ── Request bar ── */
    #request-bar {
      flex: none;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }

    .method-pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .method-pill.GET  { background: rgba(16,185,129,0.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.22); }
    .method-pill.POST { background: rgba(59,130,246,0.12); color: #93c5fd; border: 1px solid rgba(59,130,246,0.22); }

    #url-display {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-2);
      background: transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #url-display em { color: var(--teal-light); font-style: normal; }

    #send-btn {
      flex: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 7px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: var(--teal);
      color: #fff;
      transition: background 0.15s, transform 0.1s;
    }
    #send-btn:hover { background: #0f766e; }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled { background: #1e3a50; color: #4b6282; cursor: not-allowed; transform: none; }

    /* ── Response meta bar ── */
    #meta-bar {
      flex: none;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,15,30,0.6);
      min-height: 38px;
    }

    .meta-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.6875rem;
      font-family: 'DM Mono', monospace;
    }
    .meta-label { color: var(--text-3); }
    .meta-value { color: var(--text-2); font-weight: 500; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 0.6875rem;
      font-weight: 500;
    }
    .status-2xx { background: rgba(16,185,129,0.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
    .status-4xx { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
    .status-5xx { background: rgba(239,68,68,0.14); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }

    .copy-btn {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 5px;
      font-size: 0.6875rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border-md);
      background: transparent;
      color: var(--text-3);
      transition: all 0.15s;
    }
    .copy-btn:hover { border-color: var(--teal); color: var(--teal-light); background: var(--teal-glow); }
    .copy-btn.copied { border-color: rgba(16,185,129,0.3); color: #6ee7b7; background: rgba(16,185,129,0.08); }

    /* ── JSON output area ── */
    #output-wrap {
      flex: 1;
      overflow-y: auto;
      position: relative;
    }

    /* loading overlay */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: var(--bg-panel);
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    #loading-overlay.visible { opacity: 1; pointer-events: all; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(13,148,136,0.2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6875rem;
      color: var(--text-3);
      letter-spacing: 0.06em;
    }

    /* empty state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--text-3);
    }
    #empty-state svg { opacity: 0.25; }
    #empty-state p { font-size: 0.8125rem; }

    /* json pre */
    #json-pre {
      display: none;
      margin: 0;
      padding: 20px 24px 40px;
      font-family: 'DM Mono', monospace;
      font-size: 0.6875rem;
      line-height: 1.75;
      white-space: pre;
      tab-size: 2;
      color: var(--text-1);
      background: transparent;
      border: none;
      outline: none;
      min-height: 100%;
    }
    #json-pre.visible { display: block; }

    /* ── JSON syntax tokens ── */
    .jk  { color: var(--json-key); }          /* key */
    .js  { color: var(--json-str); }          /* string value */
    .jn  { color: var(--json-num); }          /* number */
    .jb  { color: var(--json-bool); }         /* boolean */
    .jx  { color: var(--json-null); }         /* null */
    .jp  { color: var(--json-brace); }        /* punctuation { } [ ] */
    .jc  { color: var(--json-comma); }        /* , : */

    /* ── Error pane ── */
    #error-pane {
      display: none;
      margin: 20px 24px;
      padding: 16px 20px;
      border-radius: 10px;
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.18);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: #fca5a5;
      line-height: 1.6;
    }
    #error-pane.visible { display: block; }

    /* ── Sidebar scroll ── */
    #sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 12px;
    }

    /* ── Divider within sidebar ── */
    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 16px;
    }

    /* ── Mobile hamburger ── */
    #mobile-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border-md);
      background: transparent;
      color: var(--text-2);
      transition: all 0.15s;
    }
    #mobile-toggle:hover { background: var(--bg-hover); color: var(--text-1); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #mobile-toggle { display: flex; }

      #sidebar {
        position: fixed;
        top: 52px;
        left: 0;
        bottom: 0;
        z-index: 30;
        transform: translateX(-100%);
        transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 4px 0 20px rgba(0,0,0,0.4);
      }
      #sidebar.open { transform: translateX(0); }

      #sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        top: 52px;
        background: rgba(0,0,0,0.5);
        z-index: 29;
      }
      #sidebar-backdrop.visible { display: block; }

      #url-display { display: none; }
    }

    @media (min-width: 769px) {
      #sidebar-backdrop { display: none !important; }
    }

    /* ── Line numbers gutter (decorative) ── */
    #json-pre { counter-reset: line-num; }

    /* Scanline hover effect on pre */
    #json-pre::selection { background: rgba(13,148,136,0.25); }

    /* ── Total/Pages summary chips ── */
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 0.625rem;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      background: rgba(45,212,191,0.07);
      border: 1px solid rgba(45,212,191,0.14);
      color: var(--teal-light);
    }
    .meta-chip .chip-label { color: var(--text-3); margin-right: 2px; }

    /* ── Sidebar footer ── */
    #sidebar-footer {
      flex: none;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: 0.625rem;
      font-family: 'DM Mono', monospace;
      color: var(--text-3);
    }
    #sidebar-footer a { color: var(--teal); text-decoration: none; }
    #sidebar-footer a:hover { color: var(--teal-light); }
  </style>
</head>
<body>

<div id="app">

  <!-- ═══════════════ TOP HEADER ═══════════════ -->
  <header id="top-header">

    <div style="display:flex;align-items:center;gap:14px;">
      <!-- Mobile hamburger -->
      <button id="mobile-toggle" aria-label="Toggle sidebar" onclick="toggleSidebar()">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <rect x="1" y="3" width="13" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="1" y="7" width="13" height="1.5" rx="0.75" fill="currentColor"/>
          <rect x="1" y="11" width="13" height="1.5" rx="0.75" fill="currentColor"/>
        </svg>
      </button>

      <!-- Logo + wordmark -->
      <div style="display:flex;align-items:center;gap:8px;">
        <svg width="26" height="26" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="8" fill="#0d9488" fill-opacity="0.15"/>
          <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" stroke="#0d9488" stroke-opacity="0.4"/>
          <rect x="6" y="11" width="20" height="12" rx="2" stroke="#0d9488" stroke-width="1.5" fill="none"/>
          <line x1="6" y1="16" x2="26" y2="16" stroke="#0d9488" stroke-width="1.5"/>
          <line x1="13" y1="11" x2="13" y2="23" stroke="#0d9488" stroke-width="1"/>
          <line x1="19" y1="11" x2="19" y2="23" stroke="#0d9488" stroke-width="1"/>
          <circle cx="10" cy="24" r="2" fill="#0d9488"/>
          <circle cx="22" cy="24" r="2" fill="#0d9488"/>
        </svg>
        <span class="wordmark">Cyclos<span>.ai</span></span>
        <span style="font-size:0.625rem;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:4px;background:rgba(13,148,136,0.1);color:#0d9488;border:1px solid rgba(13,148,136,0.2);margin-left:2px;">API Explorer</span>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:12px;">
      <div id="auth-badge" class="auth-badge pending">
        <span class="dot"></span>
        <span id="auth-label">Authenticating</span>
      </div>
      <a href="./index.html" class="back-link">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M7.5 2L3.5 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Portal
      </a>
    </div>

  </header>

  <!-- Sidebar backdrop (mobile) -->
  <div id="sidebar-backdrop" onclick="closeSidebar()"></div>

  <!-- ═══════════════ BODY ═══════════════ -->
  <div id="body">

    <!-- ═══ SIDEBAR ═══ -->
    <aside id="sidebar">
      <div id="sidebar-scroll">

        <!-- Auth -->
        <p class="sidebar-section-label">Auth</p>
        <ul class="ep-list" id="ep-list"></ul>

      </div>

      <div id="sidebar-footer">
        Base: <span style="color:var(--teal-light);">/api/v1</span>&nbsp;&nbsp;·&nbsp;&nbsp;Tenant: <span style="color:var(--teal-light);">demo</span>
      </div>
    </aside>

    <!-- ═══ CONTENT ═══ -->
    <div id="content">

      <!-- Request bar -->
      <div id="request-bar">
        <span id="method-pill" class="method-pill GET">GET</span>
        <div id="url-display"><em>/api/v1</em>/containers</div>
        <button id="send-btn" onclick="resendCurrent()" disabled>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6h8M7 3l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Send
        </button>
      </div>

      <!-- Meta bar -->
      <div id="meta-bar">
        <span style="color:var(--text-3);font-size:0.6875rem;font-family:'DM Mono',monospace;">Select an endpoint to begin</span>
      </div>

      <!-- Output wrap -->
      <div id="output-wrap">

        <!-- Loading overlay -->
        <div id="loading-overlay">
          <div class="spinner"></div>
          <span class="loading-label">Fetching response…</span>
        </div>

        <!-- Empty state -->
        <div id="empty-state">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect x="6" y="12" width="28" height="18" rx="3" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
            <line x1="6" y1="19" x2="34" y2="19" stroke="#94a3b8" stroke-width="1.5"/>
            <line x1="16" y1="12" x2="16" y2="30" stroke="#94a3b8" stroke-width="1"/>
            <line x1="24" y1="12" x2="24" y2="30" stroke="#94a3b8" stroke-width="1"/>
            <circle cx="11" cy="32" r="2.5" fill="#94a3b8"/>
            <circle cx="29" cy="32" r="2.5" fill="#94a3b8"/>
          </svg>
          <p>Select an endpoint from the sidebar</p>
        </div>

        <!-- Error pane -->
        <div id="error-pane"></div>

        <!-- JSON output -->
        <pre id="json-pre" aria-label="JSON response"></pre>

      </div>

    </div><!-- /content -->

  </div><!-- /body -->

</div><!-- /app -->

<script>
// ─────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────
const API_BASE    = '/api/v1';
const TENANT      = 'demo';
const LOGIN_EMAIL = 'admin@cyclos.ai';
const LOGIN_PASS  = 'password';

// ─────────────────────────────────────────────────────────────
// ENDPOINT REGISTRY
// ─────────────────────────────────────────────────────────────
const SECTIONS = [
  {
    label: 'Auth',
    endpoints: [
      { method: 'POST', path: '/auth/login',  label: '/auth/login'  },
      { method: 'GET',  path: '/auth/me',     label: '/auth/me'     },
    ],
  },
  {
    label: 'Containers',
    endpoints: [
      { method: 'GET', path: '/containers',             label: '/containers'             },
      { method: 'GET', path: '/containers/active',      label: '/containers/active'      },

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let authToken    = null;
let currentEp    = null;   // { method, path }
let lastRawJSON  = null;   // raw JSON string for copy
let activeItem   = null;   // DOM element

// ─────────────────────────────────────────────────────────────
// BUILD SIDEBAR
// ─────────────────────────────────────────────────────────────
function buildSidebar() {
  const container = document.getElementById('ep-list').parentElement;

  // Remove the skeleton ep-list placeholder
  const placeholder = document.getElementById('ep-list');
  if (placeholder) placeholder.remove();

  // Auth label was already inserted; we need to rebuild fully
  // Clear existing sidebar-scroll content
  const scroll = document.getElementById('sidebar-scroll');
  scroll.innerHTML = '';

  SECTIONS.forEach((section, si) => {
    // Section label
    const label = document.createElement('p');
    label.className = 'sidebar-section-label';
    label.textContent = section.label;
    scroll.appendChild(label);

    // Endpoint list
    const ul = document.createElement('ul');
    ul.className = 'ep-list';

    section.endpoints.forEach((ep, ei) => {
      const li = document.createElement('li');
      li.className = 'ep-item';
      li.dataset.method = ep.method;
      li.dataset.path   = ep.path;
      li.setAttribute('role', 'button');
      li.setAttribute('tabindex', '0');
      li.setAttribute('aria-label', `${ep.method} ${ep.path}`);

      li.innerHTML = `
        <span class="method-badge method-${ep.method.toLowerCase()}">${ep.method}</span>
        <span class="ep-path">${ep.label}</span>
      `;

      li.addEventListener('click',  () => selectEndpoint(ep, li));
      li.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectEndpoint(ep, li); } });

      ul.appendChild(li);
    });

    scroll.appendChild(ul);

    // Divider (not after last)
    if (si < SECTIONS.length - 1) {
      const div = document.createElement('div');
      div.className = 'sidebar-divider';
      scroll.appendChild(div);
    }
  });
}

// ─────────────────────────────────────────────────────────────
// AUTH
// ─────────────────────────────────────────────────────────────
async function doLogin() {
  setBadge('pending', 'Authenticating…');
  try {
    const res = await fetch(`${API_BASE}/auth/login`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept':        'application/json',
        'X-Tenant':      TENANT,
      },
      body: JSON.stringify({ email: LOGIN_EMAIL, password: LOGIN_PASS }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    authToken = data.token
      || data.access_token
      || data.data?.token
      || data.data?.access_token
      || null;
    if (!authToken) throw new Error('No token in response');
    setBadge('ok', 'Authenticated');
    enableSendBtn();
    return true;
  } catch (err) {
    setBadge('failed', 'Auth Failed');
    enableSendBtn();   // still allow tries
    return false;
  }
}

function setBadge(state, text) {
  const badge = document.getElementById('auth-badge');
  const lbl   = document.getElementById('auth-label');
  badge.className = 'auth-badge';
  if (state === 'pending') badge.classList.add('pending');
  if (state === 'failed')  badge.classList.add('failed');
  lbl.textContent = text;
}

function enableSendBtn() {
  document.getElementById('send-btn').disabled = false;
}

// ─────────────────────────────────────────────────────────────
// REQUEST BAR
// ─────────────────────────────────────────────────────────────
function updateRequestBar(ep) {
  const pill = document.getElementById('method-pill');
  pill.className = `method-pill ${ep.method}`;
  pill.textContent = ep.method;

  const urlEl = document.getElementById('url-display');
  urlEl.innerHTML = `<em>/api/v1</em>${ep.path}`;
}

// ─────────────────────────────────────────────────────────────
// SELECT ENDPOINT
// ─────────────────────────────────────────────────────────────
function selectEndpoint(ep, liEl) {
  // Update active style
  if (activeItem) activeItem.classList.remove('active');
  activeItem = liEl;
  liEl.classList.add('active');

  currentEp = ep;
  updateRequestBar(ep);
  closeSidebar();

  // Auto-fire request
  fireRequest(ep);
}

function resendCurrent() {
  if (currentEp) fireRequest(currentEp);
}

// ─────────────────────────────────────────────────────────────
// FIRE REQUEST
// ─────────────────────────────────────────────────────────────
async function fireRequest(ep) {
  showLoading(true);
  clearOutput();

  const startMs = performance.now();

  try {
    const headers = {
      'Accept':    'application/json',
      'X-Tenant':  TENANT,
    };
    if (authToken) headers['Authorization'] = `Bearer ${authToken}`;

    let fetchOpts = { headers };
    if (ep.method === 'POST') {
      fetchOpts.method = 'POST';
      headers['Content-Type'] = 'application/json';
      // login uses fixed body
      if (ep.path === '/auth/login') {
        fetchOpts.body = JSON.stringify({ email: LOGIN_EMAIL, password: LOGIN_PASS });
      }
    }

    const res = await fetch(`${API_BASE}${ep.path}`, fetchOpts);
    const elapsed = Math.round(performance.now() - startMs);

    let json = null;
    const text = await res.text();
    try { json = JSON.parse(text); } catch { /* not json */ }

    showLoading(false);
    renderMeta(res.status, elapsed, json);

    if (json !== null) {
      const pretty = JSON.stringify(json, null, 2);
      lastRawJSON = pretty;
      renderJSON(pretty);
    } else {
      showError(`Non-JSON response (${res.status}):\n\n${text.substring(0, 500)}`);
    }

  } catch (err) {
    const elapsed = Math.round(performance.now() - startMs);
    showLoading(false);
    renderMeta(0, elapsed, null);
    showError(`Network error: ${err.message}`);
    lastRawJSON = null;
  }
}

// ─────────────────────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────────────────────
function showLoading(show) {
  const el = document.getElementById('loading-overlay');
  el.classList.toggle('visible', show);
}

function clearOutput() {
  document.getElementById('empty-state').style.display  = 'none';
  document.getElementById('error-pane').className       = 'error-pane';
  document.getElementById('error-pane').style.display   = 'none';
  document.getElementById('json-pre').className         = '';
  document.getElementById('json-pre').innerHTML         = '';
}

function showError(msg) {
  const el = document.getElementById('error-pane');
  el.style.display = 'block';
  el.className = 'error-pane visible';
  el.textContent = msg;
}

function renderMeta(status, ms, json) {
  const bar = document.getElementById('meta-bar');

  let statusHTML = '';
  if (status > 0) {
    const cls = status >= 500 ? 'status-5xx' : status >= 400 ? 'status-4xx' : 'status-2xx';
    statusHTML = `<span class="status-pill ${cls}">${status}</span>`;
  } else {
    statusHTML = `<span class="status-pill status-4xx">ERR</span>`;
  }

  let metaChips = '';
  if (json) {
    const total = json?.meta?.total ?? json?.total ?? null;
    const pages = json?.meta?.pages ?? json?.meta?.last_page ?? null;
    const count = Array.isArray(json?.data) ? json.data.length
                : Array.isArray(json)       ? json.length
                : null;
    if (total !== null) metaChips += `<span class="meta-chip"><span class="chip-label">total</span>${Number(total).toLocaleString()}</span>`;
    if (pages !== null) metaChips += `<span class="meta-chip"><span class="chip-label">pages</span>${pages}</span>`;
    if (count !== null && total === null) metaChips += `<span class="meta-chip"><span class="chip-label">records</span>${count}</span>`;
  }

  bar.innerHTML = `
    <span class="meta-tag">${statusHTML}</span>
    <span class="meta-tag"><span class="meta-label">time</span>&nbsp;<span class="meta-value">${ms} ms</span></span>
    ${metaChips}
    <button class="copy-btn" id="copy-btn" onclick="copyJSON()" ${!lastRawJSON && !json ? 'disabled' : ''}>
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
        <rect x="3.5" y="3.5" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/>
        <path d="M1.5 7.5V1.5h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Copy JSON
    </button>
  `;
}

// ─────────────────────────────────────────────────────────────
// JSON SYNTAX HIGHLIGHTER
// ─────────────────────────────────────────────────────────────
function escapeHTML(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function highlightJSON(json) {
  // Tokenise via regex
  return json.replace(
    /("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|[{}\[\]]|[,:])/g,
    function(match) {
      if (/^"/.test(match)) {
        if (/:$/.test(match)) {
          // key: strip the colon, wrap key in span, re-add colon
          const key = match.slice(0, -1);
          return `<span class="jk">${escapeHTML(key)}</span><span class="jc">:</span>`;
        }
        return `<span class="js">${escapeHTML(match)}</span>`;
      }
      if (/true|false/.test(match))  return `<span class="jb">${match}</span>`;
      if (/null/.test(match))        return `<span class="jx">${match}</span>`;
      if (/^[{}\[\]]$/.test(match))  return `<span class="jp">${match}</span>`;
      if (/^[,]$/.test(match))       return `<span class="jc">${match}</span>`;
      return `<span class="jn">${match}</span>`;
    }
  );
}

function renderJSON(pretty) {
  const pre = document.getElementById('json-pre');
  pre.className = 'visible';
  pre.innerHTML = highlightJSON(pretty);
}

// ─────────────────────────────────────────────────────────────
// COPY JSON
// ─────────────────────────────────────────────────────────────
async function copyJSON() {
  if (!lastRawJSON) return;
  try {
    await navigator.clipboard.writeText(lastRawJSON);
    const btn = document.getElementById('copy-btn');
    if (!btn) return;
    btn.classList.add('copied');
    btn.innerHTML = `
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
        <path d="M1.5 5.5l3 3 5-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Copied!
    `;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <rect x="3.5" y="3.5" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/>
          <path d="M1.5 7.5V1.5h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        Copy JSON
      `;
    }, 2000);
  } catch (_) { /* clipboard access denied */ }
}

// ─────────────────────────────────────────────────────────────
// MOBILE SIDEBAR
// ─────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar  = document.getElementById('sidebar');
  const backdrop = document.getElementById('sidebar-backdrop');
  const isOpen   = sidebar.classList.contains('open');
  sidebar.classList.toggle('open', !isOpen);
  backdrop.classList.toggle('visible', !isOpen);
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('visible');
}

// ─────────────────────────────────────────────────────────────
// AUTO-SELECT DEFAULT ENDPOINT
// ─────────────────────────────────────────────────────────────
function selectDefaultEndpoint() {
  // Find GET /containers item
  const allItems = document.querySelectorAll('.ep-item');
  for (const li of allItems) {
    if (li.dataset.method === 'GET' && li.dataset.path === '/containers') {
      const ep = { method: 'GET', path: '/containers' };
      selectEndpoint(ep, li);
      return;
    }
  }
}

// ─────────────────────────────────────────────────────────────
// BOOTSTRAP
// ─────────────────────────────────────────────────────────────
async function init() {
  buildSidebar();
  const loginOk = await doLogin();
  // Auto-load /containers regardless of auth state
  selectDefaultEndpoint();
}

document.addEventListener('DOMContentLoaded', init);
